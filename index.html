    <script>
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyxlgzLPXDS5Ojm_KoL__0szE2PFeYT6t9CPgpRVM2g6exzVGuGWbI7HM_GpIL0L_r5nw/exec";

        let db = { transactions: [], todos: [] };
        
        // Minimalist UI Category config
        const catIcons = {
            'food': { icon: 'ph-fork-knife', color: 'text-ink', bg: 'bg-[#F3F3F2]' },
            'housing': { icon: 'ph-house', color: 'text-ink', bg: 'bg-[#F3F3F2]' },
            'transport': { icon: 'ph-car', color: 'text-ink', bg: 'bg-[#F3F3F2]' },
            'entertainment': { icon: 'ph-game-controller', color: 'text-ink', bg: 'bg-[#F3F3F2]' },
            'other': { icon: 'ph-package', color: 'text-ink', bg: 'bg-[#F3F3F2]' },
            'topup': { icon: 'ph-arrow-down', color: 'text-[#346538]', bg: 'bg-[#EDF3EC]' }
        };
        let tChart = null, cChart = null;

        // UI & Modal 控制 (Added GSAP Animations)
        function switchTab(tabId) {
            ['dashboard', 'calendar', 'todo'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.add('hidden');
                document.getElementById(`btn-${t}-desk`).classList.remove('active');
                document.getElementById(`btn-${t}-mob`).classList.remove('active');
            });
            
            const targetTab = document.getElementById(`tab-${tabId}`);
            targetTab.classList.remove('hidden');
            
            // GSAP Tab Reveal
            gsap.fromTo(targetTab, 
                { opacity: 0, y: 8 }, 
                { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" }
            );

            document.getElementById(`btn-${tabId}-desk`).classList.add('active');
            document.getElementById(`btn-${tabId}-mob`).classList.add('active');
            if(tabId === 'dashboard') setTimeout(renderCharts, 50);
        }

        function openAddModal() {
            document.getElementById('exp-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('exp-amount').value = '';
            document.getElementById('my-share').value = '';
            document.getElementById('partner-share').value = '';
            document.getElementById('receipt-upload').value = '';
            document.getElementById('file-label-text').innerText = "附上發票或明細";
            document.getElementById('file-label-text').classList.remove('text-ink');
            toggleSplitOptions();
            
            const modal = document.getElementById('add-modal');
            modal.classList.remove('hidden');
            
            // GSAP Modal Pop
            gsap.fromTo(modal, { backgroundColor: "rgba(251,251,250,0)" }, { backgroundColor: "rgba(251,251,250,0.8)", duration: 0.3 });
            gsap.fromTo(modal.querySelector('.modal-panel'), 
                { opacity: 0, scale: 0.96, y: 20 }, 
                { opacity: 1, scale: 1, y: 0, duration: 0.4, ease: "back.out(1.1)" }
            );
        }

        function openTopupModal() { 
            document.getElementById('top-date').value = new Date().toISOString().split('T')[0]; 
            const modal = document.getElementById('topup-modal');
            modal.classList.remove('hidden');
            
            gsap.fromTo(modal, { backgroundColor: "rgba(251,251,250,0)" }, { backgroundColor: "rgba(251,251,250,0.8)", duration: 0.3 });
            gsap.fromTo(modal.querySelector('.modal-panel'), 
                { opacity: 0, scale: 0.96, y: 20 }, 
                { opacity: 1, scale: 1, y: 0, duration: 0.4, ease: "back.out(1.1)" }
            );
        }

        function closeModal(id) { 
            const modal = document.getElementById(id);
            gsap.to(modal.querySelector('.modal-panel'), { opacity: 0, scale: 0.98, y: 10, duration: 0.2 });
            gsap.to(modal, { backgroundColor: "rgba(251,251,250,0)", duration: 0.2, onComplete: () => {
                modal.classList.add('hidden');
            }});
        }

        document.getElementById('receipt-upload').addEventListener('change', (e) => {
            const labelText = document.getElementById('file-label-text');
            if (e.target.files.length > 0) {
                labelText.innerText = "已選取圖片";
                labelText.classList.add('text-ink');
            } else {
                labelText.innerText = "附上發票或明細";
                labelText.classList.remove('text-ink');
            }
        });

        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        // 動態分攤邏輯
        const amtInput = document.getElementById('exp-amount');
        const myShareInput = document.getElementById('my-share');
        const partnerShareInput = document.getElementById('partner-share');

        amtInput.addEventListener('input', () => { const total = parseFloat(amtInput.value) || 0; myShareInput.value = total / 2; partnerShareInput.value = total / 2; });
        myShareInput.addEventListener('input', () => { const total = parseFloat(amtInput.value) || 0; let myVal = parseFloat(myShareInput.value) || 0; if (myVal > total) { myVal = total; myShareInput.value = total; } partnerShareInput.value = total - myVal; });
        partnerShareInput.addEventListener('input', () => { const total = parseFloat(amtInput.value) || 0; let partnerVal = parseFloat(partnerShareInput.value) || 0; if (partnerVal > total) { partnerVal = total; partnerShareInput.value = total; } myShareInput.value = total - partnerVal; });

        function setSplit(ratio) { const total = parseFloat(amtInput.value) || 0; myShareInput.value = total * ratio; partnerShareInput.value = total - (total * ratio); }
        function toggleSplitOptions() { document.getElementById('split-section').classList.toggle('hidden', document.querySelector('input[name="payer"]:checked').value === 'fund'); }

        // --- 防呆連線邏輯 ---
        function showLoading(msg = "Syncing...") { 
            document.getElementById('loading-text').innerText = msg;
            const overlay = document.getElementById('loading-overlay');
            overlay.classList.remove('hidden');
            gsap.fromTo(overlay, { opacity: 0 }, { opacity: 1, duration: 0.2 });
        }
        function hideLoading() { 
            const overlay = document.getElementById('loading-overlay');
            gsap.to(overlay, { opacity: 0, duration: 0.2, onComplete: () => overlay.classList.add('hidden') });
        }

        async function fetchData() {
            showLoading("Syncing latest data...");
            try { 
                let res = await fetch(GAS_API_URL); 
                let rawText = await res.text();
                try {
                    db = JSON.parse(rawText);
                } catch (jsonErr) {
                    throw new Error("API 未回傳正確的 JSON 資料。\n請確定有正確發佈 Apps Script。");
                }
                updateCoreUI(); 
            } 
            catch (err) { 
                alert("讀取失敗：\n\n" + err.message); 
            } 
            finally { hideLoading(); }
        }

        async function sendPostAction(action, dataObj, extraParams = {}) {
            showLoading("Committing changes...");
            try {
                let res = await fetch(GAS_API_URL, { method: "POST", body: JSON.stringify(Object.assign({ action, data: dataObj }, extraParams)) });
                let result = await res.json();
                if(result.status === "error") throw new Error(result.message);
                await fetchData();
            } catch (err) { 
                alert("寫入失敗：\n\n" + err.message); 
                hideLoading();
            }
        }

        function updateCoreUI() {
            let fundBalance = 0, myPersonalDebt = 0;
            if(!db.transactions) db.transactions = [];
            db.transactions.sort((a, b) => new Date(b.date) - new Date(a.date));

            db.transactions.forEach(t => {
                const amt = parseFloat(t.amount);
                const myRatio = parseFloat(t.splitRatio) / 100; 
                if (t.type === 'topup') fundBalance += amt;
                else if (t.type === 'expense') {
                    if (t.payer === 'fund') fundBalance -= amt;
                    else if (!t.isSettled) {
                        let myShare = amt * myRatio;
                        let partnerShare = amt - myShare;
                        if (t.payer === 'me') myPersonalDebt += partnerShare;
                        else if (t.payer === 'partner') myPersonalDebt -= myShare;
                    }
                }
            });

            // GSAP value counter
            const balanceEl = document.getElementById('dash-fund-balance');
            gsap.to(balanceEl, { innerHTML: fundBalance, duration: 0.8, snap: "innerHTML", onUpdate: function() {
                balanceEl.innerHTML = `$${Number(balanceEl.innerHTML).toLocaleString()}`;
            }});

            const sTitle = document.getElementById('settle-title');
            const sDesc = document.getElementById('settle-desc');
            
            if (myPersonalDebt === 0) { 
                sTitle.innerText = "代墊狀態"; 
                sDesc.innerText = "互不相欠"; 
                sDesc.className = "text-2xl md:text-3xl font-mono tracking-tight text-mute";
            }
            else if (myPersonalDebt > 0) { 
                sTitle.innerText = "喬須給凱"; 
                sDesc.innerText = `$${myPersonalDebt.toLocaleString()}`; 
                sDesc.className = "text-2xl md:text-3xl font-mono tracking-tight text-[#9F2F2D]"; // Pale red text
            }
            else { 
                sTitle.innerText = "凱須給喬"; 
                sDesc.innerText = `$${Math.abs(myPersonalDebt).toLocaleString()}`; 
                sDesc.className = "text-2xl md:text-3xl font-mono tracking-tight text-[#1F6C9F]"; // Pale blue text
            }

            renderHistoryList();
            renderTodos();
            renderCharts();
        }

        document.getElementById('expense-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const payer = document.querySelector('input[name="payer"]:checked').value;
            const total = parseFloat(amtInput.value);
            const myShare = parseFloat(myShareInput.value) || 0;
            let calcRatio = payer === 'fund' ? 0 : (myShare / total) * 100;

            const expenseData = {
                id: Date.now(), type: 'expense', date: document.getElementById('exp-date').value,
                desc: document.getElementById('exp-desc').value, amount: total,
                payer: payer, splitRatio: calcRatio.toFixed(2),
                category: document.getElementById('exp-category').value, note: document.getElementById('exp-note').value,
                isSettled: false
            };

            let imageData = null;
            const fileInput = document.getElementById('receipt-upload');
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const base64String = await getBase64(file);
                const splitData = base64String.split(',');
                imageData = { mimeType: file.type, base64: splitData[1] };
            }

            closeModal('add-modal');
            sendPostAction("addTransaction", expenseData, { imageData: imageData });
        });

        document.getElementById('topup-form').addEventListener('submit', function(e) {
            e.preventDefault();
            sendPostAction("addTransaction", {
                id: Date.now(), type: 'topup', date: document.getElementById('top-date').value,
                desc: '存入公積金', amount: parseFloat(document.getElementById('top-amount').value),
                category: 'topup', note: document.getElementById('top-note').value
            });
            closeModal('topup-modal');
        });

        function deleteTx(id) { if(confirm('確定刪除這筆紀錄？')) sendPostAction("deleteTransaction", null, { id }); }
        function archiveSettlement() { if(confirm('確認將目前的代墊結清歸零嗎？')) sendPostAction("archive", null); }

        function renderHistoryList() {
            const list = document.getElementById('full-history-list');
            list.innerHTML = '';
            
            db.transactions.forEach(t => {
                const s = catIcons[t.category] || catIcons['other'];
                
                // Minimalist Tags
                let tag = t.type==='topup' ? `<span class="text-[9px] font-mono tracking-widest uppercase bg-[#EDF3EC] text-[#346538] px-1.5 py-0.5 rounded">入金</span>` : 
                          (t.payer==='fund' ? `<span class="text-[9px] font-mono tracking-widest uppercase bg-line text-mute px-1.5 py-0.5 rounded">公積金</span>` : 
                          `<span class="text-[9px] font-mono tracking-widest uppercase bg-[#E1F3FE] text-[#1F6C9F] px-1.5 py-0.5 rounded">${t.payer==='me'?'凱墊付':'喬墊付'}</span>`);
                
                let imgIcon = t.receiptUrl ? `<a href="${t.receiptUrl}" target="_blank" class="text-mute hover:text-ink ml-2"><i class="ph-bold ph-image"></i></a>` : '';

                list.insertAdjacentHTML('beforeend', `
                    <div class="history-item p-4 border-b border-line flex justify-between items-center group hover:bg-[#FBFBFA] transition-colors">
                        <div class="flex gap-4 items-center">
                            <div class="w-9 h-9 rounded ${s.bg} ${s.color} flex items-center justify-center text-sm shrink-0"><i class="ph-bold ${s.icon}"></i></div>
                            <div>
                                <h5 class="font-medium text-ink text-sm flex items-center">${t.desc} ${imgIcon}</h5>
                                <div class="flex items-center gap-2 mt-1"><p class="text-[10px] font-mono text-mute">${t.date}</p>${tag}</div>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="font-mono text-sm ${t.type==='topup'?'text-[#346538]':'text-ink'}">$${parseFloat(t.amount).toLocaleString()}</div>
                            <button onclick="deleteTx(${t.id})" class="text-mute hover:text-[#9F2F2D] p-1 md:opacity-0 md:group-hover:opacity-100 transition-opacity"><i class="ph-bold ph-trash text-xs"></i></button>
                        </div>
                    </div>
                `);
            });

            // GSAP stagger effect
            if (document.getElementById('tab-calendar').classList.contains('hidden') === false) {
                gsap.fromTo(".history-item", { opacity: 0, y: 4 }, { opacity: 1, y: 0, stagger: 0.02, duration: 0.3 });
            }
        }

        document.getElementById('todo-form').addEventListener('submit', function(e) {
            e.preventDefault();
            sendPostAction("addTodo", { id: Date.now(), text: document.getElementById('todo-input').value });
            document.getElementById('todo-input').value = '';
        });
        
        function toggleTodo(id, cur) { sendPostAction("toggleTodo", null, { id, completed: !cur }); }
        function deleteTodo(id) { sendPostAction("deleteTodo", null, { id }); }
        function convertTodo(id, text) { openAddModal(); document.getElementById('exp-desc').value = text; sendPostAction("deleteTodo", null, { id }); }
        
        function renderTodos() {
            const list = document.getElementById('todo-list');
            list.innerHTML = '';
            if(!db.todos || db.todos.length === 0) {
                list.innerHTML = '<div class="p-4 text-xs text-mute text-center">No tasks pending.</div>';
                return;
            }
            
            db.todos.forEach(t => {
                let isComp = (t.completed === true || t.completed === "true");
                list.insertAdjacentHTML('beforeend', `
                    <div class="todo-item p-3 border-b border-line flex items-center justify-between ${isComp ? 'opacity-40 bg-[#FBFBFA]' : 'bg-surface'} transition-colors">
                        <div class="flex items-center gap-3 w-full cursor-pointer" onclick="toggleTodo(${t.id}, ${isComp})">
                            <div class="w-4 h-4 border ${isComp ? 'border-ink bg-ink text-surface' : 'border-line'} rounded flex items-center justify-center text-[10px]">
                                ${isComp ? '<i class="ph-bold ph-check"></i>' : ''}
                            </div>
                            <span class="text-sm ${isComp ? 'line-through text-mute' : 'text-ink'} transition-all">${t.text}</span>
                        </div>
                        <div class="flex gap-2 shrink-0">
                            ${!isComp ? `<button onclick="convertTodo(${t.id}, '${t.text}')" class="text-[10px] text-mute hover:text-ink border border-line px-2 py-0.5 rounded transition-colors"><i class="ph-bold ph-arrows-left-right mr-1"></i>轉支出</button>` : ''}
                            <button onclick="deleteTodo(${t.id})" class="text-mute hover:text-[#9F2F2D] p-1"><i class="ph-bold ph-trash text-xs"></i></button>
                        </div>
                    </div>
                `);
            });
        }

        function renderCharts() {
            if(document.getElementById('tab-dashboard').classList.contains('hidden')) return;
            
            // Shared configuration
            Chart.defaults.font.family = '"Geist Mono", "JetBrains Mono", monospace';
            Chart.defaults.color = '#787774';

            const ctxL = document.getElementById('trendChart').getContext('2d');
            const labels = [];
            for (let i = 6; i >= 0; i--) { const d = new Date(); d.setDate(d.getDate() - i); labels.push(d.toISOString().split('T')[0]); }
            const lineData = labels.map(date => db.transactions.filter(t => t.date === date && t.type === 'expense').reduce((sum, t) => sum + parseFloat(t.amount), 0));
            
            if(tChart) tChart.destroy();
            tChart = new Chart(ctxL, {
                type: 'line',
                data: { 
                    labels: labels.map(l => l.substring(5)), 
                    datasets: [{ 
                        data: lineData, 
                        borderColor: '#111111', 
                        backgroundColor: 'rgba(17, 17, 17, 0.04)', 
                        borderWidth: 1.5, 
                        tension: 0, // Sharp lines for editorial feel
                        fill: true, 
                        pointBackgroundColor: '#FFFFFF',
                        pointBorderColor: '#111111',
                        pointRadius: 3,
                        pointHoverRadius: 5
                    }] 
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } }, 
                    scales: { 
                        x: { grid: { display: false }, border: { display: false }, ticks: { font: { size: 10 } } }, 
                        y: { beginAtZero: true, border: { display: false }, grid: { color: '#EAEAEA', drawTicks: false }, ticks: { maxTicksLimit: 5, font: { size: 10 } } } 
                    } 
                }
            });

            const ctxC = document.getElementById('categoryChart').getContext('2d');
            const catSums = { 'food':0, 'housing':0, 'transport':0, 'entertainment':0, 'other':0 };
            db.transactions.filter(t => t.type === 'expense').forEach(t => { if(catSums[t.category]!==undefined) catSums[t.category] += parseFloat(t.amount); });
            
            if(cChart) cChart.destroy();
            cChart = new Chart(ctxC, {
                type: 'doughnut',
                data: { 
                    labels: ['飲食', '居住', '交通', '娛樂', '其他'], 
                    // Muted palette for minimalist editorial look
                    datasets: [{ data: Object.values(catSums), backgroundColor: ['#111111', '#787774', '#D4D4D4', '#F3F3F2', '#EAEAEA'], borderWidth: 1, borderColor: '#FFFFFF' }] 
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    cutout: '75%', 
                    plugins: { legend: { position: 'right', labels: { usePointStyle: true, boxWidth: 6, font: { size: 10, family: '"SF Pro Display", sans-serif' } } } } 
                }
            });
        }

        // 初次進入頁面，自動讀取
        window.onload = fetchData;
    </script>
</body>
</html>
