<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>我們的帳本</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { ink: '#111111', mute: '#787774', bone: '#FBFBFA', surface: '#FFFFFF', line: '#EAEAEA' },
                    fontFamily: {
                        sans: ['"SF Pro Display"', '"Geist Sans"', '"Helvetica Neue"', 'sans-serif'],
                        mono: ['"Geist Mono"', '"JetBrains Mono"', 'monospace']
                    }
                }
            }
        }
    </script>

    <style>
        html, body { background-color: #FBFBFA; color: #111111; overscroll-behavior-y: none; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        
        .nav-item { color: #787774; transition: all 0.2s ease; }
        .nav-item:hover:not(.active) { color: #111111; background-color: #F7F6F3; }
        .nav-item.active { color: #111111; background-color: #F3F3F2; font-weight: 500; pointer-events: none; }
        .mobile-nav-item.active { color: #111111; }
        .mobile-nav-item:not(.active) { color: #787774; }

        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .no-ring:focus { outline: none; box-shadow: none; }
        
        .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 8px); }
        #sync-indicator { transition: opacity 0.3s; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-[100dvh] overflow-hidden font-sans text-ink">

    <div id="sync-indicator" class="fixed top-2 right-2 z-[150] bg-ink text-surface text-[10px] font-mono px-2 py-1 rounded-full flex items-center gap-1.5 opacity-0 pointer-events-none shadow-md">
        <i class="ph-bold ph-arrows-clockwise animate-spin"></i> Syncing
    </div>

    <div id="auth-modal" class="fixed inset-0 bg-bone z-[200] flex flex-col justify-center items-center p-6 hidden">
        <div class="w-full max-w-sm space-y-6">
            <div class="text-center space-y-2">
                <div class="w-16 h-16 bg-ink text-surface rounded-2xl mx-auto flex items-center justify-center text-3xl mb-4"><i class="ph-bold ph-hand-waving"></i></div>
                <h2 class="text-2xl font-bold tracking-tight">歡迎使用帳本</h2>
                <p class="text-sm text-mute">請設定你的專屬身分，以便系統記錄。</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs uppercase font-mono tracking-widest text-mute mb-1.5">暱稱</label>
                    <input type="text" id="auth-name" class="w-full h-11 bg-surface border border-line rounded-lg px-3 text-sm outline-none focus:border-ink transition-colors" placeholder="e.g. 凱">
                </div>
                <div>
                    <label class="block text-xs uppercase font-mono tracking-widest text-mute mb-1.5">大頭貼 (Emoji)</label>
                    <input type="text" id="auth-avatar" class="w-full h-11 bg-surface border border-line rounded-lg px-3 text-2xl outline-none focus:border-ink transition-colors text-center" value="🧑🏻‍💻" maxlength="2">
                </div>
                <button onclick="saveProfile()" class="w-full h-11 bg-ink text-surface rounded-lg font-medium hover:bg-gray-800 transition-transform active:scale-95">開始使用</button>
            </div>
        </div>
    </div>

    <aside class="hidden md:flex w-64 bg-bone border-r border-line flex-col justify-between shrink-0 z-40">
        <div class="p-6">
            <div class="flex items-center gap-3 mb-10">
                <div id="sidebar-avatar" class="w-8 h-8 bg-line rounded-full flex items-center justify-center text-lg">👤</div>
                <div>
                    <h1 class="font-bold text-sm" id="sidebar-name">User</h1>
                    <p class="text-[10px] font-mono text-mute uppercase">Shared Ledger</p>
                </div>
            </div>
            <nav class="space-y-1">
                <button onclick="switchTab('dashboard')" id="btn-dashboard-desk" class="nav-item active w-full flex items-center gap-3 px-4 py-2.5 rounded-md text-sm"><i class="ph-bold ph-chart-pie-slice w-5"></i> 總覽</button>
                <button onclick="switchTab('budget')" id="btn-budget-desk" class="nav-item w-full flex items-center gap-3 px-4 py-2.5 rounded-md text-sm"><i class="ph-bold ph-target w-5"></i> 預算</button>
                <button onclick="switchTab('calendar')" id="btn-calendar-desk" class="nav-item w-full flex items-center gap-3 px-4 py-2.5 rounded-md text-sm"><i class="ph-bold ph-list-dashes w-5"></i> 明細</button>
                <button onclick="switchTab('todo')" id="btn-todo-desk" class="nav-item w-full flex items-center gap-3 px-4 py-2.5 rounded-md text-sm"><i class="ph-bold ph-check-square w-5"></i> 待辦</button>
            </nav>
        </div>
        <div class="p-4 border-t border-line space-y-2">
            <button onclick="clearProfile()" class="w-full text-xs text-mute hover:text-red-500 py-2 flex items-center justify-center gap-2 transition-colors"><i class="ph-bold ph-sign-out"></i> 切換帳號</button>
            <button onclick="window.location.href = window.location.pathname + '?v=' + new Date().getTime();" class="w-full text-xs text-mute hover:text-ink py-2 flex items-center justify-center gap-2 transition-colors"><i class="ph-bold ph-cloud-arrow-down"></i> 強制更新版本</button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden relative bg-bone">
        
        <header class="h-14 md:h-16 bg-surface border-b border-line flex items-center justify-between px-4 md:px-8 z-10 shrink-0">
            <div class="flex items-center gap-2">
                <div id="header-avatar" class="md:hidden w-7 h-7 bg-line rounded-full flex items-center justify-center text-sm mr-1">👤</div>
                <span class="text-[11px] bg-bone border border-line text-mute font-mono uppercase tracking-wider px-2 py-1 rounded flex items-center gap-1.5"><i class="ph-bold ph-buildings"></i> 共用公積金</span>
            </div>
            <div class="flex items-center gap-2 shrink-0">
                <button onclick="openTopupModal()" class="text-ink bg-bone border border-line hover:bg-line text-xs font-medium px-3 md:px-4 py-1.5 rounded-md flex items-center gap-1.5 transition-colors"><i class="ph-bold ph-arrow-down"></i> <span class="hidden md:inline">存入資金</span></button>
                <button onclick="openAddModal()" class="bg-ink text-surface hover:bg-gray-800 text-xs font-medium px-3 md:px-4 py-1.5 rounded-md flex items-center gap-1.5 transition-transform active:scale-95"><i class="ph-bold ph-plus"></i> <span class="hidden sm:inline">記一筆</span></button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 md:p-8 pb-32 md:pb-8 scroll-smooth">
            <section id="tab-dashboard" class="space-y-4 md:space-y-6 max-w-5xl mx-auto tab-content">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6">
                    <div class="bg-surface p-6 rounded-lg border border-line flex flex-col justify-center relative overflow-hidden group">
                        <p class="text-[10px] text-mute font-mono uppercase tracking-widest mb-2 flex items-center gap-1.5"><i class="ph-bold ph-bank"></i> 公積金餘額</p>
                        <h3 class="text-3xl md:text-4xl font-mono text-ink tracking-tight" id="dash-fund-balance">$0</h3>
                    </div>
                    
                    <div class="bg-surface p-6 rounded-lg border border-line md:col-span-2 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <p class="text-[10px] text-mute font-mono uppercase tracking-widest mb-2" id="settle-title">代墊結算狀態</p>
                            <h3 class="text-2xl md:text-3xl font-mono tracking-tight" id="settle-desc">互不相欠</h3>
                        </div>
                        <button onclick="archiveSettlement()" class="text-xs text-mute border border-line hover:border-ink hover:text-ink px-4 py-1.5 rounded-md transition-colors flex items-center gap-1.5"><i class="ph-bold ph-checks"></i> 結清歸零</button>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 md:gap-6">
                    <div class="bg-surface p-6 rounded-lg border border-line lg:col-span-2">
                        <h4 class="font-mono text-[10px] uppercase tracking-widest text-mute mb-6 flex items-center gap-1.5"><i class="ph-bold ph-trend-up"></i> 近期支出趨勢</h4>
                        <div class="h-48 md:h-64 relative"><canvas id="trendChart"></canvas></div>
                    </div>
                    <div class="bg-surface p-6 rounded-lg border border-line flex flex-col">
                        <h4 class="font-mono text-[10px] uppercase tracking-widest text-mute mb-6 flex items-center gap-1.5"><i class="ph-bold ph-chart-pie-slice"></i> 分類佔比</h4>
                        <div class="flex-1 relative flex items-center justify-center min-h-[160px] md:min-h-[200px]"><canvas id="categoryChart"></canvas></div>
                    </div>
                </div>

                <div class="bg-surface p-6 rounded-lg border border-line lg:col-span-3">
                    <h4 class="font-mono text-[10px] uppercase tracking-widest text-mute mb-4 flex items-center gap-1.5"><i class="ph-bold ph-calendar-arrow-down"></i> 設定好的固定化支出</h4>
                    <div id="recurring-list" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
                </div>
            </section>

            <section id="tab-budget" class="hidden max-w-3xl mx-auto space-y-4 md:space-y-6 tab-content">
                <div class="bg-surface p-6 rounded-lg border border-line">
                    <div class="flex justify-between items-center mb-6">
                        <h4 class="font-mono text-[10px] uppercase tracking-widest text-mute flex items-center gap-1.5"><i class="ph-bold ph-target"></i> 本月預算消耗</h4>
                        <button onclick="setBudgetTarget()" class="text-[10px] text-mute border border-line px-2 py-1 rounded hover:text-ink transition-colors">設定目標</button>
                    </div>
                    <div class="flex justify-between items-end mb-2">
                        <div>
                            <p class="text-xs text-mute mb-1">已花費</p>
                            <h3 class="text-3xl font-mono text-ink tracking-tight" id="budget-spent">$0</h3>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-mute mb-1">本月目標</p>
                            <p class="text-sm font-mono text-mute" id="budget-target">/ $20,000</p>
                        </div>
                    </div>
                    <div class="w-full bg-bone border border-line rounded-full h-3 mb-2 overflow-hidden">
                        <div id="budget-bar" class="bg-ink h-3 rounded-full transition-all duration-1000" style="width: 0%"></div>
                    </div>
                    <p class="text-[10px] text-mute text-right" id="budget-status-text">剩餘 $20,000</p>
                </div>
            </section>

            <section id="tab-calendar" class="hidden max-w-4xl mx-auto h-full tab-content">
                <div class="bg-surface rounded-lg border border-line h-[calc(100dvh-180px)] flex flex-col">
                    <div class="p-4 md:p-6 border-b border-line flex justify-between items-center shrink-0">
                        <h4 class="font-mono text-[10px] uppercase tracking-widest text-mute flex items-center gap-1.5"><i class="ph-bold ph-clock-counter-clockwise"></i> 歷史明細 (點擊查看詳情)</h4>
                    </div>
                    <div class="flex-1 overflow-y-auto" id="full-history-list"></div>
                </div>
            </section>

            <section id="tab-todo" class="hidden max-w-3xl mx-auto space-y-4 md:space-y-6 tab-content">
                <div class="bg-surface p-5 md:p-6 rounded-lg border border-line mb-4">
                    <form id="todo-form" class="flex gap-3 items-center">
                        <i class="ph-bold ph-plus text-mute"></i>
                        <input type="text" id="todo-input" required class="flex-1 bg-transparent border-none p-0 text-sm outline-none no-ring placeholder:text-line" placeholder="新增待辦或採買事項...">
                        <button type="submit" class="text-xs text-mute hover:text-ink font-medium px-2 transition-colors">Enter</button>
                    </form>
                </div>
                <div id="todo-list" class="space-y-4"></div>
            </section>
        </main>
    </div>

    <nav class="md:hidden fixed bottom-0 w-full bg-surface border-t border-line flex justify-around items-center z-40 px-2 pt-2 pb-[calc(env(safe-area-inset-bottom)+8px)] shadow-[0_-4px_15px_rgba(0,0,0,0.03)]">
        <button onclick="switchTab('dashboard')" id="btn-dashboard-mob" class="mobile-nav-item active flex flex-col items-center gap-1 w-1/4 transition-colors"><i class="ph-bold ph-chart-pie-slice text-xl"></i><span class="text-[10px] font-medium tracking-wide">總覽</span></button>
        <button onclick="switchTab('budget')" id="btn-budget-mob" class="mobile-nav-item flex flex-col items-center gap-1 w-1/4 transition-colors"><i class="ph-bold ph-target text-xl"></i><span class="text-[10px] font-medium tracking-wide">預算</span></button>
        <button onclick="switchTab('calendar')" id="btn-calendar-mob" class="mobile-nav-item flex flex-col items-center gap-1 w-1/4 transition-colors"><i class="ph-bold ph-list-dashes text-xl"></i><span class="text-[10px] font-medium tracking-wide">明細</span></button>
        <button onclick="switchTab('todo')" id="btn-todo-mob" class="mobile-nav-item flex flex-col items-center gap-1 w-1/4 transition-colors"><i class="ph-bold ph-check-square text-xl"></i><span class="text-[10px] font-medium tracking-wide">待辦</span></button>
    </nav>

    <div id="view-modal" class="hidden fixed inset-0 bg-bone/80 backdrop-blur-sm z-50 flex items-end md:items-center justify-center p-0 md:p-4">
        <div class="modal-panel bg-surface w-full max-w-sm md:rounded-xl border-t md:border border-line flex flex-col max-h-[90dvh]">
            <div class="p-4 border-b border-line flex justify-between items-center shrink-0">
                <h3 class="text-sm font-medium text-ink flex items-center gap-2"><i class="ph-bold ph-receipt text-mute"></i> 明細詳情</h3>
                <button type="button" onclick="closeModal('view-modal')" class="text-mute hover:text-ink p-1"><i class="ph-bold ph-x text-lg"></i></button>
            </div>
            <div class="p-5 overflow-y-auto space-y-4" id="view-modal-content"></div>
        </div>
    </div>

    <div id="add-modal" class="hidden fixed inset-0 bg-bone/80 backdrop-blur-sm z-50 flex items-end md:items-center justify-center p-0 md:p-4">
        <div class="modal-panel bg-surface w-full max-w-md md:rounded-xl border-t md:border border-line flex flex-col max-h-[90dvh]">
            <div class="p-4 md:p-5 border-b border-line flex justify-between items-center shrink-0">
                <h3 class="text-sm font-medium text-ink flex items-center gap-2"><i class="ph-bold ph-pencil-simple text-mute"></i> 紀錄支出</h3>
                <button type="button" onclick="closeModal('add-modal')" class="text-mute hover:text-ink transition-colors p-1"><i class="ph-bold ph-x text-lg"></i></button>
            </div>
            <div class="overflow-y-auto p-4 md:p-6 pb-[env(safe-area-inset-bottom)]">
                <form id="expense-form" class="space-y-5">
                    
                    <div class="border border-dashed border-line rounded-md p-3 flex justify-center items-center group hover:border-mute transition-colors cursor-pointer relative overflow-hidden bg-bone min-h-[60px]">
                        <input type="file" accept="image/*" capture="environment" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" id="receipt-upload">
                        <div id="file-label-container" class="flex items-center gap-2 text-xs text-mute group-hover:text-ink font-medium">
                            <i class="ph-bold ph-camera"></i> <span>拍照 / 附上發票</span>
                        </div>
                        <img id="preview-image" src="" class="hidden absolute inset-0 w-full h-full object-contain z-0">
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-1">
                            <label class="block text-[10px] uppercase font-mono tracking-widest text-mute mb-1.5">日期</label>
                            <input type="date" id="exp-date" required class="w-full h-11 bg-bone border border-line rounded-md px-3 text-sm outline-none focus:border-ink transition-colors box-border">
                        </div>
                        <div class="flex-1">
                            <label class="block text-[10px] uppercase font-mono tracking-widest text-mute mb-1.5">分類</label>
                            <div class="relative">
                                <select id="exp-category" onchange="handleCategoryChange()" class="w-full h-11 bg-bone border border-line rounded-md px-3 text-sm outline-none focus:border-ink transition-colors appearance-none box-border">
                                    <option value="food">飲食</option>
                                    <option value="housing">居住</option>
                                    <option value="transport">交通</option>
                                    <option value="entertainment">娛樂</option>
                                    <option value="other">其他/轉帳</option>
                                    <option value="custom">自訂輸入...</option>
                                </select>
                                <div class="absolute right-3 top-0 bottom-0 flex items-center pointer-events-none text-mute"><i class="ph-bold ph-caret-down"></i></div>
                            </div>
                        </div>
                    </div>

                    <div id="custom-cat-wrapper" class="hidden">
                        <input type="text" id="exp-custom-cat" class="w-full h-11 bg-bone border border-line rounded-md px-3 text-sm outline-none focus:border-ink transition-colors placeholder:text-line" placeholder="請輸入自訂分類名稱 (如：寵物、保險)">
                    </div>

                    <div>
                        <label class="block text-[10px] uppercase font-mono tracking-widest text-mute mb-1.5">項目名稱 (選填)</label>
                        <input type="text" id="exp-desc" class="w-full bg-transparent border-b border-line p-2 text-sm outline-none focus:border-ink placeholder:text-line transition-colors" placeholder="留白將自動填入分類名稱">
                    </div>
                    
                    <div>
                        <label class="block text-[10px] uppercase font-mono tracking-widest text-mute mb-1.5">總金額</label>
                        <div class="relative">
                            <span class="absolute left-0 top-2.5 text-mute font-mono">$</span>
                            <input type="text" id="exp-amount" readonly onclick="openCalculator()" class="w-full bg-transparent border-b border-line py-2 pl-4 text-xl font-mono text-ink outline-none focus:border-ink placeholder:text-line transition-colors cursor-pointer" placeholder="點擊計算...">
                        </div>
                    </div>
                    
                    <div id="payer-section-wrapper">
                        <label class="block text-[10px] uppercase font-mono tracking-widest text-mute mb-2">付款來源</label>
                        <div class="flex gap-2 bg-bone p-1 rounded-md border border-line" id="payer-container">
                            <label class="flex-1 text-center cursor-pointer">
                                <input type="radio" name="payer" value="fund" class="peer sr-only" onchange="toggleSplitOptions()">
                                <div class="peer-checked:bg-surface peer-checked:shadow-sm peer-checked:text-ink text-mute rounded py-2 text-xs transition-all font-medium flex justify-center items-center gap-1"><i class="ph-bold ph-bank"></i>公積金</div>
                            </label>
                            <label class="flex-1 text-center cursor-pointer">
                                <input type="radio" name="payer" value="me" class="peer sr-only" checked onchange="toggleSplitOptions()">
                                <div id="payer-me-label" class="peer-checked:bg-surface peer-checked:shadow-sm peer-checked:text-ink text-mute rounded py-2 text-xs transition-all font-medium flex justify-center items-center gap-1">🧑🏻‍💻 我</div>
                            </label>
                            <label class="flex-1 text-center cursor-pointer">
                                <input type="radio" name="payer" value="partner" class="peer sr-only" onchange="toggleSplitOptions()">
                                <div class="peer-checked:bg-surface peer-checked:shadow-sm peer-checked:text-ink text-mute rounded py-2 text-xs transition-all font-medium flex justify-center items-center gap-1"><i class="ph-bold ph-user"></i>另一半</div>
                            </label>
                        </div>
                    </div>

                    <div id="split-section" class="bg-bone p-4 rounded-md border border-line">
                        <div class="flex items-center justify-between mb-3 border-b border-line pb-2">
                            <label class="text-[10px] uppercase font-mono tracking-widest text-mute">分攤比例</label>
                            <div class="flex gap-2">
                                <button type="button" onclick="setSplit(0.5)" class="text-[9px] font-mono border border-line hover:border-mute text-mute px-1.5 py-0.5 rounded transition-colors">50/50</button>
                                <button type="button" onclick="setSplit(1)" class="text-[9px] font-mono border border-line hover:border-mute text-mute px-1.5 py-0.5 rounded transition-colors">我全出</button>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="flex-1">
                                <label class="block text-[9px] text-mute mb-1">我的負擔</label>
                                <div class="relative">
                                    <span class="absolute left-2 top-2 text-mute font-mono text-xs">$</span>
                                    <input type="number" id="my-share" class="w-full bg-surface border border-line rounded p-2 pl-6 text-sm font-mono outline-none focus:border-ink transition-colors">
                                </div>
                            </div>
                            <div class="text-line text-sm mt-3"><i class="ph-bold ph-plus"></i></div>
                            <div class="flex-1">
                                <label class="block text-[9px] text-mute mb-1">另一半負擔</label>
                                <div class="relative">
                                    <span class="absolute left-2 top-2 text-mute font-mono text-xs">$</span>
                                    <input type="number" id="partner-share" class="w-full bg-surface border border-line rounded p-2 pl-6 text-sm font-mono outline-none focus:border-ink transition-colors">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div>
                        <input type="text" id="exp-note" class="w-full bg-transparent border-b border-line p-2 text-sm outline-none focus:border-ink placeholder:text-line transition-colors" placeholder="備註 (選填)...">
                    </div>

                    <div class="bg-bone border border-line rounded-md p-3">
                        <label class="flex items-center gap-2 cursor-pointer group mb-2">
                            <input type="checkbox" id="exp-recurring" class="w-4 h-4 rounded border-line text-ink focus:ring-ink" onchange="document.getElementById('recurring-opts').classList.toggle('hidden')">
                            <span class="text-xs font-medium text-ink">設定為自動固定支出</span>
                        </label>
                        <div id="recurring-opts" class="hidden mt-3 pt-3 border-t border-line space-y-3">
                            <div>
                                <label class="block text-[10px] text-mute mb-1">觸發頻率</label>

    <div id="calculator-sheet" class="fixed inset-x-0 bottom-0 z-[60] bg-[#FBFBFA] border-t border-line transform translate-y-full transition-transform duration-300 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] pb-[calc(env(safe-area-inset-bottom)+8px)]">
        <div class="p-3 bg-surface flex justify-between items-center border-b border-line">

    <script>
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyxlgzLPXDS5Ojm_KoL__0szE2PFeYT6t9CPgpRVM2g6exzVGuGWbI7HM_GpIL0L_r5nw/exec";

        let db = { transactions: [], todos: [], recurring_rules: [] };
        let userProfile = { name: '', avatar: '' };
        
        const catIcons = {
            'food': { icon: 'ph-fork-knife', color: 'text-ink', bg: 'bg-[#F3F3F2]', label: '飲食' },
            'housing': { icon: 'ph-house', color: 'text-ink', bg: 'bg-[#F3F3F2]', label: '居住' },
            'transport': { icon: 'ph-car', color: 'text-ink', bg: 'bg-[#F3F3F2]', label: '交通' },
            'entertainment': { icon: 'ph-game-controller', color: 'text-ink', bg: 'bg-[#F3F3F2]', label: '娛樂' },
            'other': { icon: 'ph-arrows-left-right', color: 'text-ink', bg: 'bg-[#F3F3F2]', label: '其他/轉帳' },
            'topup': { icon: 'ph-arrow-down', color: 'text-[#346538]', bg: 'bg-[#EDF3EC]', label: '入金' }
        };
        let tChart = null, cChart = null;

        function initMonthlyGrid() {
            let gridHtml = '';
            for(let i=1; i<=31; i++) {
                gridHtml += `<label class="text-center border border-line rounded py-1.5 bg-surface text-xs cursor-pointer"><input type="checkbox" value="${i}" class="sr-only peer"><div class="peer-checked:bg-ink peer-checked:text-surface rounded h-full flex items-center justify-center transition-colors">${i}</div></label>`;
            }
            document.getElementById('monthly-grid').innerHTML = gridHtml;
        }

        let calcExpression = '';
        function openCalculator() {
            document.getElementById('calculator-sheet').style.transform = 'translateY(0)';
            calcExpression = document.getElementById('exp-amount').value || '';
            updateCalcDisplay();
        }
        function closeCalculator() {
            calcEvaluate();
            document.getElementById('calculator-sheet').style.transform = 'translateY(100%)';
            document.getElementById('exp-amount').dispatchEvent(new Event('input')); 
        }
        function calcInput(val) {
            if(val === 'C') { calcExpression = ''; }
            else if(val === '=') { calcEvaluate(); }
            else { calcExpression += val; }
            updateCalcDisplay();
        }
        function calcEvaluate() {
            try {
                if(calcExpression) {
                    let res = new Function('return ' + calcExpression)();
                    calcExpression = Math.round(res).toString();
                }
            } catch(e) { calcExpression = ''; }
            updateCalcDisplay();
        }
        function updateCalcDisplay() {
            document.getElementById('calc-display').innerText = calcExpression || '0';
            document.getElementById('exp-amount').value = calcExpression;
        }

        function checkProfile() {
            const saved = localStorage.getItem('om_profile');
            if(saved) {
                userProfile = JSON.parse(saved);
                document.getElementById('sidebar-name').innerText = userProfile.name;
                document.getElementById('sidebar-avatar').innerText = userProfile.avatar;
                document.getElementById('header-avatar').innerText = userProfile.avatar;
                
                const meLabel = document.getElementById('payer-me-label');
                if (meLabel) meLabel.innerHTML = `${userProfile.avatar} 我`;
            } else {
                document.getElementById('auth-modal').classList.remove('hidden');
            }
        }
        function saveProfile() {
            const name = document.getElementById('auth-name').value || '使用者';
            const avatar = document.getElementById('auth-avatar').value || '🧑🏻‍💻';
            userProfile = { name, avatar };
            localStorage.setItem('om_profile', JSON.stringify(userProfile));
            document.getElementById('auth-modal').classList.add('hidden');
            checkProfile();
        }
        function clearProfile() { localStorage.removeItem('om_profile'); location.reload(); }

        function switchTab(tabId) {
            ['dashboard', 'budget', 'calendar', 'todo'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.add('hidden');
                if(document.getElementById(`btn-${t}-desk`)) document.getElementById(`btn-${t}-desk`).classList.remove('active');
                if(document.getElementById(`btn-${t}-mob`)) document.getElementById(`btn-${t}-mob`).classList.remove('active');
            });
            const targetTab = document.getElementById(`tab-${tabId}`);
            targetTab.classList.remove('hidden');
            gsap.fromTo(targetTab, { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" });
            if(document.getElementById(`btn-${tabId}-desk`)) document.getElementById(`btn-${tabId}-desk`).classList.add('active');
            if(document.getElementById(`btn-${tabId}-mob`)) document.getElementById(`btn-${tabId}-mob`).classList.add('active');
            if(tabId === 'dashboard') setTimeout(renderCharts, 50);
            if(tabId === 'budget') setTimeout(renderBudget, 50);
        }

        function openAddModal() {
            document.getElementById('exp-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('exp-amount').value = '';
            calcExpression = '';
            document.getElementById('calc-display').innerText = '0';
            document.getElementById('exp-desc').value = ''; 
            document.getElementById('my-share').value = '';
            document.getElementById('partner-share').value = '';
            
            document.getElementById('exp-category').value = 'food';
            document.getElementById('custom-cat-wrapper').classList.add('hidden');
            document.getElementById('exp-custom-cat').value = '';

            document.getElementById('exp-recurring').checked = false;
            document.getElementById('recurring-opts').classList.add('hidden');
            document.querySelectorAll('#monthly-grid input').forEach(cb => cb.checked = false);
            
            document.getElementById('receipt-upload').value = '';
            document.getElementById('preview-image').src = '';
            document.getElementById('preview-image').classList.add('hidden');
            document.getElementById('file-label-container').classList.remove('hidden');
            
            toggleSplitOptions();
            const modal = document.getElementById('add-modal');
            modal.classList.remove('hidden');
            gsap.fromTo(modal, { backgroundColor: "rgba(251,251,250,0)" }, { backgroundColor: "rgba(251,251,250,0.8)", duration: 0.3 });
            gsap.fromTo(modal.querySelector('.modal-panel'), { opacity: 0, scale: 0.96, y: 20 }, { opacity: 1, scale: 1, y: 0, duration: 0.4, ease: "back.out(1.1)" });
        }

        window.handleCategoryChange = function() {
            const cat = document.getElementById('exp-category').value;
            const customWrapper = document.getElementById('custom-cat-wrapper');
            if (cat === 'custom') {
                customWrapper.classList.remove('hidden');
                document.getElementById('exp-custom-cat').focus();
            } else {
                customWrapper.classList.add('hidden');
            }
        };

        function openTopupModal() { 
            document.getElementById('top-date').value = new Date().toISOString().split('T')[0]; 
            document.getElementById('top-amount').value = '';
            document.getElementById('top-note').value = '';
            
            const modal = document.getElementById('topup-modal');
            modal.classList.remove('hidden');
            gsap.fromTo(modal, { backgroundColor: "rgba(251,251,250,0)" }, { backgroundColor: "rgba(251,251,250,0.8)", duration: 0.3 });
            gsap.fromTo(modal.querySelector('.modal-panel'), { opacity: 0, scale: 0.96, y: 20 }, { opacity: 1, scale: 1, y: 0, duration: 0.4, ease: "back.out(1.1)" });
        }

        function closeModal(id) { 
            const modal = document.getElementById(id);
            gsap.to(modal.querySelector('.modal-panel'), { opacity: 0, scale: 0.98, y: 10, duration: 0.2 });
            gsap.to(modal, { backgroundColor: "rgba(251,251,250,0)", duration: 0.2, onComplete: () => { modal.classList.add('hidden'); }});
        }

        document.getElementById('receipt-upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(evt) {
                    const img = document.getElementById('preview-image');
                    img.src = evt.target.result;
                    img.classList.remove('hidden');
                    document.getElementById('file-label-container').classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        });

        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        function toggleRecDetails() {
            const type = document.getElementById('rec-type').value;
            document.getElementById('rec-detail-weekly').classList.toggle('hidden', type !== 'weekly');
            document.getElementById('rec-detail-monthly').classList.toggle('hidden', type !== 'monthly');
        }

        const amtInput = document.getElementById('exp-amount');
        const myShareInput = document.getElementById('my-share');
        const partnerShareInput = document.getElementById('partner-share');

        amtInput.addEventListener('input', () => { const total = parseFloat(amtInput.value) || 0; myShareInput.value = total / 2; partnerShareInput.value = total / 2; });
        myShareInput.addEventListener('input', () => { const total = parseFloat(amtInput.value) || 0; let myVal = parseFloat(myShareInput.value) || 0; if (myVal > total) { myVal = total; myShareInput.value = total; } partnerShareInput.value = total - myVal; });
        partnerShareInput.addEventListener('input', () => { const total = parseFloat(amtInput.value) || 0; let partnerVal = parseFloat(partnerShareInput.value) || 0; if (partnerVal > total) { partnerVal = total; partnerShareInput.value = total; } myShareInput.value = total - partnerVal; });

        function setSplit(ratio) { const total = parseFloat(amtInput.value) || 0; myShareInput.value = total * ratio; partnerShareInput.value = total - (total * ratio); }
        function toggleSplitOptions() { 
            const checkedRadio = document.querySelector('input[name="payer"]:checked');
            if(checkedRadio) {
                const isFund = checkedRadio.value === 'fund';
                document.getElementById('split-section').classList.toggle('hidden', isFund); 
            }
        }

        function startSync() { document.getElementById('sync-indicator').classList.remove('opacity-0'); }
        function stopSync() { document.getElementById('sync-indicator').classList.add('opacity-0'); }

        async function initLoad() {
            initMonthlyGrid(); 
            checkProfile();
            const cached = localStorage.getItem('om_db');
            if (cached) { 
                try {
                    db = JSON.parse(cached); 
                    updateCoreUI(); 
                } catch(e) {}
            }
            
            startSync();
            try { 
                let res = await fetch(GAS_API_URL); 
                let rawText = await res.text();
                db = JSON.parse(rawText);
                localStorage.setItem('om_db', rawText);
                updateCoreUI(); 
            } catch (err) { console.error("背景更新失敗", err); } 
            finally { stopSync(); }
        }

        async function optimisticSendPost(action, dataObj, extraParams = {}) {
            if(action === "addTransaction") { db.transactions.push(dataObj); }
            else if(action === "addTodo") { db.todos.push({id: dataObj.id, text: dataObj.text, completed: false}); }
            else if(action === "deleteTransaction") { db.transactions = db.transactions.filter(t => t.id.toString() !== dataObj.id.toString()); }
            else if(action === "deleteTodo") { db.todos = db.todos.filter(t => t.id.toString() !== dataObj.id.toString()); }
            else if(action === "addRecurringRule") { db.recurring_rules.push(dataObj); }
            else if(action === "deleteRecurringRule") { db.recurring_rules = db.recurring_rules.filter(r => r.id.toString() !== dataObj.id.toString()); }
            else if(action === "archive") { db.transactions.forEach(t => { if(t.type === 'expense' && t.payer !== 'fund') t.isSettled = true; }); }
            else if(action === "toggleTodo") { 
                let td = db.todos.find(t => t.id.toString() === dataObj.id.toString());
                if(td) td.completed = dataObj.completed;
            }
            
            updateCoreUI();
            // 馬上儲存到快取，防止重新整理遺失
            localStorage.setItem('om_db', JSON.stringify(db));
            startSync();

            try {
                // 加入 text/plain 宣告，防止手機瀏覽器阻擋 POST
                let res = await fetch(GAS_API_URL, { 
                    method: "POST", 
                    body: JSON.stringify(Object.assign({ action, data: dataObj }, extraParams)),
                    headers: { "Content-Type": "text/plain;charset=utf-8" }
                });
                let result = await res.json();
                if(result.status !== "success") throw new Error(result.message || "Sync Failed");
            } catch (err) {
                alert("背景連線異常，資料已暫存於手機端，請稍後下拉重整確認。");
                // 發生錯誤時不主動清空資料，保留快取
            } finally { stopSync(); }
        }

        function updateCoreUI() {
            if(!db.transactions) db.transactions = [];
            db.transactions.sort((a, b) => new Date(b.date) - new Date(a.date));

            let fundBalance = 0, myPersonalDebt = 0;

            db.transactions.forEach(t => {
                const amt = parseFloat(t.amount);
                const myRatio = parseFloat(t.splitRatio) / 100; 
                
                if (t.type === 'topup') {
                    fundBalance += amt;
                } else if (t.type === 'expense') {
                    if (t.payer === 'fund') fundBalance -= amt;
                    else if (t.isSettled === false || t.isSettled === "FALSE" || t.isSettled === "") {
                        let myShare = amt * myRatio;
                        let partnerShare = amt - myShare;
                        if (t.payer === 'me') myPersonalDebt += partnerShare;
                        else if (t.payer === 'partner') myPersonalDebt -= myShare;
                    }
                }
            });

            const balanceEl = document.getElementById('dash-fund-balance');
            balanceEl.innerHTML = `$${Number(fundBalance).toLocaleString()}`;

            const sTitle = document.getElementById('settle-title');
            const sDesc = document.getElementById('settle-desc');
            if (myPersonalDebt === 0) { 
                sTitle.innerText = "代墊狀態"; sDesc.innerText = "互不相欠"; sDesc.className = "text-2xl md:text-3xl font-mono tracking-tight text-mute";
            } else if (myPersonalDebt > 0) { 
                sTitle.innerText = "另一半須給你"; sDesc.innerText = `$${myPersonalDebt.toLocaleString()}`; sDesc.className = "text-2xl md:text-3xl font-mono tracking-tight text-[#9F2F2D]"; 
            } else { 
                sTitle.innerText = "你須給另一半"; sDesc.innerText = `$${Math.abs(myPersonalDebt).toLocaleString()}`; sDesc.className = "text-2xl md:text-3xl font-mono tracking-tight text-[#1F6C9F]"; 
            }

            renderHistoryList();
            renderTodos();
            renderCharts();
            renderBudget();
            renderRecurringList();
        }

        function renderRecurringList() {
            const list = document.getElementById('recurring-list');
            list.innerHTML = '';
            
            if(!db.recurring_rules || db.recurring_rules.length === 0) {
                list.innerHTML = `<div class="text-xs text-mute col-span-2">目前沒有設定自動固定支出。</div>`;
                return;
            }
            
            db.recurring_rules.forEach(r => {
                let ruleText = "未定";
                if (r.rule) {
                    if (r.rule.startsWith('monthly_')) ruleText = `每月 ${r.rule.split('_')[1]} 號`;
                    else if (r.rule.startsWith('weekly_')) ruleText = `每週 ${r.rule.split('_')[1].split(',').map(d=>['日','一','二','三','四','五','六'][d]).join(', ')}`;
                    else if (r.rule === 'daily') ruleText = '每日';
                }
                
                list.insertAdjacentHTML('beforeend', `
                    <div class="flex justify-between items-center p-3 border border-line rounded-md bg-[#FBFBFA]">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded bg-line flex items-center justify-center text-mute"><i class="ph-bold ph-repeat"></i></div>
                            <div>
                                <p class="text-sm font-medium text-ink">${r.desc}</p>
                                <p class="text-[10px] font-mono text-mute mt-0.5">${ruleText}</p>
                            </div>
                        </div>
                        <div class="flex flex-col items-end gap-1">
                            <div class="font-mono text-sm text-ink">$${parseFloat(r.amount).toLocaleString()}</div>
                            <button onclick="deleteRecurring(${r.id})" class="text-[10px] text-mute hover:text-[#9F2F2D]"><i class="ph-bold ph-trash"></i> 移除</button>
                        </div>
                    </div>
                `);
            });
        }

        function deleteRecurring(id) {
            if(confirm('確定要移除這項固定支出設定嗎？')) optimisticSendPost("deleteRecurringRule", { id: id });
        }

        function setBudgetTarget() {
            let target = prompt("請輸入本月預算目標金額 (數字)：", localStorage.getItem('monthly_budget') || 20000);
            if(target && !isNaN(target)) { localStorage.setItem('monthly_budget', parseInt(target)); renderBudget(); }
        }

        function renderBudget() {
            if(document.getElementById('tab-budget').classList.contains('hidden')) return;
            const target = parseInt(localStorage.getItem('monthly_budget')) || 20000;
            const currentMonth = new Date().getMonth();
            let spentThisMonth = 0;
            db.transactions.forEach(t => { if (t.type === 'expense' && new Date(t.date).getMonth() === currentMonth) spentThisMonth += parseFloat(t.amount); });

            let percentage = (spentThisMonth / target) * 100;
            if(percentage > 100) percentage = 100;

            document.getElementById('budget-spent').innerHTML = `$${Number(spentThisMonth).toLocaleString()}`;
            document.getElementById('budget-target').innerText = `/ $${target.toLocaleString()}`;
            
            const bar = document.getElementById('budget-bar');
            bar.style.width = percentage + '%';
            if (percentage >= 90) bar.className = "bg-[#9F2F2D] h-3 rounded-full transition-all duration-1000";
            else if (percentage >= 70) bar.className = "bg-[#956400] h-3 rounded-full transition-all duration-1000";
            else bar.className = "bg-ink h-3 rounded-full transition-all duration-1000";

            let left = target - spentThisMonth;
            const statusText = document.getElementById('budget-status-text');
            if(left >= 0) { statusText.innerText = `剩餘 $${left.toLocaleString()}`; statusText.className = "text-[10px] text-mute text-right"; }
            else { statusText.innerText = `超支 $${Math.abs(left).toLocaleString()}`; statusText.className = "text-[10px] text-[#9F2F2D] text-right font-bold"; }
        }

        document.getElementById('expense-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const total = parseFloat(amtInput.value);
            if (isNaN(total) || total <= 0) {
                alert('⚠️ 記帳失敗：請點擊金額欄位，輸入正確的支出金額喔！');
                return;
            }

            const checkedPayer = document.querySelector('input[name="payer"]:checked');
            if (!checkedPayer) {
                alert('⚠️ 記帳失敗：請選擇付款來源！');
                return;
            }
            const payer = checkedPayer.value;
            const myShare = parseFloat(myShareInput.value) || 0;
            const isRecurring = document.getElementById('exp-recurring').checked;
            
            let categoryVal = document.getElementById('exp-category').value;
            let finalCategory = categoryVal;
            if (categoryVal === 'custom') {
                finalCategory = document.getElementById('exp-custom-cat').value.trim();
                if (!finalCategory) {
                    alert('⚠️ 請輸入自訂分類名稱！');
                    document.getElementById('exp-custom-cat').focus();
                    return;
                }
            }

            let descText = document.getElementById('exp-desc').value.trim();
            if(!descText) {
                if (categoryVal === 'custom') {
                    descText = finalCategory;
                } else {
                    const catSelect = document.getElementById('exp-category');
                    descText = catSelect.options[catSelect.selectedIndex].text;
                }
            }

            let calcRatio = payer === 'fund' ? 0 : (myShare / total) * 100;

            const expenseData = {
                id: Date.now(), type: 'expense', date: document.getElementById('exp-date').value,
                desc: descText, amount: total, payer: payer, splitRatio: calcRatio.toFixed(2),
                category: finalCategory, note: document.getElementById('exp-note').value,
                isSettled: false, uploader: userProfile.name
            };

            if(isRecurring) {
                let ruleStr = "monthly_" + new Date(expenseData.date).getDate();
                const rType = document.getElementById('rec-type').value;
                if(rType === 'daily') ruleStr = "daily";
                if(rType === 'weekly') {
                    let wDays = Array.from(document.querySelectorAll('#weekly-checks input:checked')).map(cb => cb.value).join(',');
                    ruleStr = wDays ? `weekly_${wDays}` : `weekly_${new Date().getDay()}`;
                }
                if(rType === 'monthly') {
                    let mDays = Array.from(document.querySelectorAll('#monthly-grid input:checked')).map(cb => cb.value).join(',');
                    ruleStr = mDays ? `monthly_${mDays}` : `monthly_${new Date().getDate()}`;
                }
                const recurringData = Object.assign({}, expenseData, { rule: ruleStr });
                optimisticSendPost("addRecurringRule", recurringData);
            }

            let imageData = null;
            const fileInput = document.getElementById('receipt-upload');
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const base64String = await getBase64(file);
                const splitData = base64String.split(',');
                imageData = { mimeType: file.type, base64: splitData[1] };
            }

            closeModal('add-modal');
            
            if(imageData) {
                startSync();
                document.getElementById('sync-indicator').innerHTML = '<i class="ph-bold ph-circle-notch animate-spin"></i> Uploading...';
                await fetch(GAS_API_URL, { 
                    method: "POST", 
                    body: JSON.stringify({ action: "addTransaction", data: expenseData, imageData: imageData }),
                    headers: { "Content-Type": "text/plain;charset=utf-8" }
                });
                document.getElementById('sync-indicator').innerHTML = '<i class="ph-bold ph-arrows-clockwise animate-spin"></i> Syncing';
                initLoad();
            } else {
                optimisticSendPost("addTransaction", expenseData);
            }
        });

        document.getElementById('topup-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const amount = parseFloat(document.getElementById('top-amount').value);
            if (isNaN(amount) || amount <= 0) return alert('請輸入正確金額');
            
            const date = document.getElementById('top-date').value;
            const note = document.getElementById('top-note').value;
            
            const payload = {
                id: Date.now(), type: 'topup', date: date, 
                desc: '存入公積金', amount: amount, category: 'topup', note: note, 
                uploader: userProfile.name
            };

            closeModal('topup-modal');
            optimisticSendPost("addTransaction", payload);
        });

        function deleteTx(id) { if(confirm('確定刪除這筆紀錄？')) optimisticSendPost("deleteTransaction", { id: id }); }
        function archiveSettlement() { if(confirm('確認結清？')) optimisticSendPost("archive", null); }

        window.showTxDetails = function(id) {
            const t = db.transactions.find(x => x.id.toString() === id.toString());
            if(!t) return;
            const s = catIcons[t.category] || catIcons['other'];
            let catLabelText = catIcons[t.category] ? catIcons[t.category].label : t.category;

            const content = document.getElementById('view-modal-content');
            let imgHtml = t.receiptUrl ? `<div class="mt-4 border border-line rounded overflow-hidden"><img src="${t.receiptUrl}" class="w-full h-auto object-contain bg-bone" alt="Receipt"></div>` : `<div class="mt-4 bg-bone text-mute text-[10px] text-center p-4 rounded font-mono border border-line">無照片附檔</div>`;
            
            let payerText = '公積金';
            if (t.payer === 'me') payerText = (t.uploader) ? `${t.uploader} 墊付` : '我';
            if (t.payer === 'partner') payerText = '另一半墊付';
            
            content.innerHTML = `
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 rounded ${s.bg} ${s.color} flex items-center justify-center text-lg shrink-0"><i class="ph-bold ${s.icon}"></i></div>
                    <div><p class="text-[10px] text-mute font-mono">${t.date}</p><h4 class="font-medium text-lg text-ink">${t.desc}</h4></div>
                </div>
                <div class="grid grid-cols-2 gap-4 bg-[#FBFBFA] p-4 rounded-md border border-line">
                    <div><p class="text-[10px] text-mute font-mono mb-1">分類</p><p class="text-sm text-ink">${catLabelText}</p></div>
                    <div><p class="text-[10px] text-mute font-mono mb-1">付款來源</p><p class="text-sm text-ink">${payerText}</p></div>
                    <div><p class="text-[10px] text-mute font-mono mb-1">記錄者</p><p class="text-sm text-ink">${t.uploader || 'System'}</p></div>
                    <div><p class="text-[10px] text-mute font-mono mb-1">總金額</p><p class="text-xl font-mono text-ink">$${parseFloat(t.amount).toLocaleString()}</p></div>
                </div>
                ${t.note ? `<div class="text-sm text-mute border-l-2 border-line pl-3 my-2">${t.note}</div>` : ''}
                ${imgHtml}
            `;
            const modal = document.getElementById('view-modal');
            modal.classList.remove('hidden');
            gsap.fromTo(modal, { backgroundColor: "rgba(251,251,250,0)" }, { backgroundColor: "rgba(251,251,250,0.8)", duration: 0.3 });
            gsap.fromTo(modal.querySelector('.modal-panel'), { opacity: 0, scale: 0.96, y: 20 }, { opacity: 1, scale: 1, y: 0, duration: 0.4, ease: "back.out(1.1)" });
        };

        function renderHistoryList() {
            const list = document.getElementById('full-history-list');
            list.innerHTML = '';
            
            db.transactions.forEach(t => {
                const s = catIcons[t.category] || catIcons['other'];
                let payerDisplay = t.payer === 'me' ? (t.uploader || '我') : (t.payer === 'partner' ? '另一半' : '公積金');

                let tag = t.type==='topup' ? `<span class="text-[9px] font-mono tracking-widest uppercase bg-[#EDF3EC] text-[#346538] px-1.5 py-0.5 rounded">入金/收入</span>` : 
                          (t.payer==='fund' ? `<span class="text-[9px] font-mono tracking-widest uppercase bg-line text-mute px-1.5 py-0.5 rounded">公積金</span>` : 
                          `<span class="text-[9px] font-mono tracking-widest uppercase bg-[#E1F3FE] text-[#1F6C9F] px-1.5 py-0.5 rounded">${payerDisplay}</span>`);
                let imgIcon = t.receiptUrl ? `<i class="ph-bold ph-image text-mute ml-2"></i>` : '';

                list.insertAdjacentHTML('beforeend', `
                    <div class="history-item p-4 border-b border-line flex justify-between items-center group hover:bg-[#FBFBFA] transition-colors cursor-pointer" onclick="showTxDetails(${t.id})">
                        <div class="flex gap-4 items-center">
                            <div class="w-9 h-9 rounded ${s.bg} ${s.color} flex items-center justify-center text-sm shrink-0"><i class="ph-bold ${s.icon}"></i></div>
                            <div>
                                <h5 class="font-medium text-ink text-sm flex items-center">${t.desc} ${imgIcon}</h5>
                                <div class="flex items-center gap-2 mt-1"><p class="text-[10px] font-mono text-mute">${t.date}</p>${tag}</div>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="font-mono text-sm ${t.type==='topup'?'text-[#346538]':'text-ink'}">$${parseFloat(t.amount).toLocaleString()}</div>
                            <button onclick="event.stopPropagation(); deleteTx(${t.id})" class="text-mute hover:text-[#9F2F2D] p-1 md:opacity-0 md:group-hover:opacity-100 transition-opacity"><i class="ph-bold ph-trash text-xs"></i></button>
                        </div>
                    </div>
                `);
            });
        }

        document.getElementById('todo-form').addEventListener('submit', function(e) {
            e.preventDefault();
            optimisticSendPost("addTodo", { id: Date.now(), text: document.getElementById('todo-input').value });
            document.getElementById('todo-input').value = '';
        });
        function toggleTodo(id, cur) { optimisticSendPost("toggleTodo", { id: id, completed: !cur }); }
        function deleteTodo(id) { optimisticSendPost("deleteTodo", { id: id }); }
        function convertTodo(id, text) { openAddModal(); document.getElementById('exp-desc').value = text; optimisticSendPost("deleteTodo", { id: id }); }
        
        function renderTodos() {
            const list = document.getElementById('todo-list');
            list.innerHTML = '';
            if(!db.todos || db.todos.length === 0) { list.innerHTML = '<div class="p-4 text-xs text-mute text-center">目前無待辦事項。</div>'; return; }
            
            let activeTodos = [];
            let doneTodos = [];
            db.todos.forEach(t => {
                let isComp = (t.completed === true || t.completed === "true");
                if(isComp) doneTodos.push(t); else activeTodos.push(t);
            });

            activeTodos.forEach(t => {
                let isUrgent = (t.text.includes('繳費') || t.text.includes('急') || t.text.includes('卡'));
                let urgentDot = isUrgent ? `<span class="w-1.5 h-1.5 rounded-full bg-[#9F2F2D] ml-2 animate-pulse"></span>` : '';
                list.insertAdjacentHTML('beforeend', `
                    <div class="todo-item p-3 border-b border-line flex items-center justify-between bg-surface transition-colors">
                        <div class="flex items-center gap-3 w-full cursor-pointer" onclick="toggleTodo(${t.id}, false)">
                            <div class="w-4 h-4 border border-line rounded flex items-center justify-center text-[10px]"></div>
                            <span class="text-sm ${isUrgent ? 'text-[#9F2F2D] font-medium' : 'text-ink'} transition-all flex items-center">${t.text} ${urgentDot}</span>
                        </div>
                        <div class="flex gap-2 shrink-0">
                            <button onclick="convertTodo(${t.id}, '${t.text}')" class="text-[10px] text-mute hover:text-ink border border-line px-2 py-0.5 rounded transition-colors"><i class="ph-bold ph-arrows-left-right mr-1"></i>轉支出</button>
                            <button onclick="deleteTodo(${t.id})" class="text-mute hover:text-[#9F2F2D] p-1"><i class="ph-bold ph-trash text-xs"></i></button>
                        </div>
                    </div>
                `);
            });

            if(doneTodos.length > 0) {
                list.insertAdjacentHTML('beforeend', '<div class="bg-bone px-4 py-2 text-[10px] text-mute font-mono uppercase tracking-widest border-y border-line">已完成任務</div>');
                doneTodos.forEach(t => {
                    list.insertAdjacentHTML('beforeend', `
                        <div class="todo-item p-3 border-b border-line flex items-center justify-between opacity-40 bg-[#FBFBFA] transition-colors">
                            <div class="flex items-center gap-3 w-full cursor-pointer" onclick="toggleTodo(${t.id}, true)">
                                <div class="w-4 h-4 border border-ink bg-ink text-surface rounded flex items-center justify-center text-[10px]"><i class="ph-bold ph-check"></i></div>
                                <span class="text-sm line-through text-mute transition-all flex items-center">${t.text}</span>
                            </div>
                            <div class="flex gap-2 shrink-0">
                                <button onclick="deleteTodo(${t.id})" class="text-mute hover:text-[#9F2F2D] p-1"><i class="ph-bold ph-trash text-xs"></i></button>
                            </div>
                        </div>
                    `);
                });
            }
        }

        function renderCharts() {
            if(document.getElementById('tab-dashboard').classList.contains('hidden')) return;
            Chart.defaults.font.family = '"Geist Mono", "JetBrains Mono", monospace';
            Chart.defaults.color = '#787774';
            const ctxL = document.getElementById('trendChart').getContext('2d');
            const labels = [];
            for (let i = 6; i >= 0; i--) { 
                let d = new Date(); 
                d.setDate(d.getDate() - i);
                let localDateStr = new Date(d.getTime() - (d.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
                labels.push(localDateStr); 
            }
            const lineData = labels.map(date => db.transactions.filter(t => t.date === date && t.type === 'expense').reduce((sum, t) => sum + parseFloat(t.amount), 0));
            
            if(tChart) tChart.destroy();
            tChart = new Chart(ctxL, {
                type: 'line',
                data: { labels: labels.map(l => l.substring(5)), datasets: [{ data: lineData, borderColor: '#111111', backgroundColor: 'rgba(17, 17, 17, 0.04)', borderWidth: 1.5, tension: 0, fill: true, pointBackgroundColor: '#FFFFFF', pointBorderColor: '#111111', pointRadius: 3, pointHoverRadius: 5 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, border: { display: false }, ticks: { font: { size: 10 } } }, y: { beginAtZero: true, border: { display: false }, grid: { color: '#EAEAEA', drawTicks: false }, ticks: { maxTicksLimit: 5, font: { size: 10 } } } } }
            });

            const ctxC = document.getElementById('categoryChart').getContext('2d');
            const catSums = { 'food':0, 'housing':0, 'transport':0, 'entertainment':0, 'other':0 };
            db.transactions.filter(t => t.type === 'expense').forEach(t => { 
                if(catSums[t.category] !== undefined) {
                    catSums[t.category] += parseFloat(t.amount); 
                } else {
                    catSums['other'] += parseFloat(t.amount);
                }
            });
            
            if(cChart) cChart.destroy();
            cChart = new Chart(ctxC, {
                type: 'doughnut',
                data: { labels: ['飲食', '居住', '交通', '娛樂', '其他'], datasets: [{ data: Object.values(catSums), backgroundColor: ['#111111', '#787774', '#D4D4D4', '#F3F3F2', '#EAEAEA'], borderWidth: 1, borderColor: '#FFFFFF' }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'right', labels: { usePointStyle: true, boxWidth: 6, font: { size: 10, family: '"SF Pro Display", sans-serif' } } } } }
            });
        }

        window.onload = initLoad;
    </script>
</body>
</html>
