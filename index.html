    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            alert("⚠️ 系統偵測到致命語法錯誤！\n\n錯誤訊息：" + message + "\n發生在第 " + lineno + " 行");
            return true;

                            </label>

    <div id="topup-modal" class="hidden fixed inset-0 bg-slate-900/60 z-50 flex items-end md:items-center justify-center p-0 md:p-4 transition-opacity">

                <button type="button" onclick="closeModal('topup-modal')" class="text-slate-400 hover:text-slate-600 p-1"><i class="fas fa-times text-lg"></i></button>
            </div>

                <div>

                    <input type="date" id="top-date" required class="w-full bg-slate-50 border border-slate-200 rounded p-2.5 text-sm outline-none">

                    <label class="block text-xs font-bold text-slate-500 mb-1">總金額 ($)</label>

                </div>

    <script>
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyxlgzLPXDS5Ojm_KoL__0szE2PFeYT6t9CPgpRVM2g6exzVGuGWbI7HM_GpIL0L_r5nw/exec";

        let db = { transactions: [], todos: [] };
        const catIcons = {
            'food': { icon: 'fa-utensils', color: 'text-orange-500', bg: 'bg-orange-50' },
            'housing': { icon: 'fa-home', color: 'text-blue-500', bg: 'bg-blue-50' },
            'transport': { icon: 'fa-car', color: 'text-teal-500', bg: 'bg-teal-50' },
            'entertainment': { icon: 'fa-gamepad', color: 'text-purple-500', bg: 'bg-purple-50' },
            'other': { icon: 'fa-box', color: 'text-slate-500', bg: 'bg-slate-100' },
            'topup': { icon: 'fa-arrow-down', color: 'text-emerald-600', bg: 'bg-emerald-50' }
        };
        let tChart = null, cChart = null;

        // UI & Modal 控制
        function switchTab(tabId) {
            ['dashboard', 'calendar', 'todo'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.add('hidden');
                document.getElementById(`btn-${t}-desk`).classList.remove('active');
                document.getElementById(`btn-${t}-mob`).classList.remove('active');
            });
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            document.getElementById(`btn-${tabId}-desk`).classList.add('active');
            document.getElementById(`btn-${tabId}-mob`).classList.add('active');
            if(tabId === 'dashboard') setTimeout(renderCharts, 50);
        }

        function openAddModal() {
            document.getElementById('exp-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('exp-amount').value = '';
            document.getElementById('my-share').value = '';
            document.getElementById('partner-share').value = '';
            document.getElementById('receipt-upload').value = '';
            document.getElementById('file-label-text').innerText = "拍照/上傳發票";
            document.getElementById('file-label-container').classList.remove('bg-indigo-100', 'border-indigo-400');
            toggleSplitOptions();
            document.getElementById('add-modal').classList.remove('hidden');
        }
        function openTopupModal() { document.getElementById('top-date').value = new Date().toISOString().split('T')[0]; document.getElementById('topup-modal').classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        document.getElementById('receipt-upload').addEventListener('change', (e) => {
            const labelText = document.getElementById('file-label-text');
            const labelContainer = document.getElementById('file-label-container');
            if (e.target.files.length > 0) {
                labelText.innerText = "已選取圖片";
                labelContainer.classList.add('bg-indigo-100', 'border-indigo-400');
            } else {
                labelText.innerText = "拍照/上傳發票";
                labelContainer.classList.remove('bg-indigo-100', 'border-indigo-400');
            }
        });

        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        // 動態分攤邏輯
        const amtInput = document.getElementById('exp-amount');
        const myShareInput = document.getElementById('my-share');
        const partnerShareInput = document.getElementById('partner-share');

        amtInput.addEventListener('input', () => { const total = parseFloat(amtInput.value) || 0; myShareInput.value = total / 2; partnerShareInput.value = total / 2; });
        myShareInput.addEventListener('input', () => { const total = parseFloat(amtInput.value) || 0; let myVal = parseFloat(myShareInput.value) || 0; if (myVal > total) { myVal = total; myShareInput.value = total; } partnerShareInput.value = total - myVal; });
        partnerShareInput.addEventListener('input', () => { const total = parseFloat(amtInput.value) || 0; let partnerVal = parseFloat(partnerShareInput.value) || 0; if (partnerVal > total) { partnerVal = total; partnerShareInput.value = total; } myShareInput.value = total - partnerVal; });

        function setSplit(ratio) { const total = parseFloat(amtInput.value) || 0; myShareInput.value = total * ratio; partnerShareInput.value = total - (total * ratio); }
        function toggleSplitOptions() { document.getElementById('split-section').classList.toggle('hidden', document.querySelector('input[name="payer"]:checked').value === 'fund'); }

        // --- 防呆連線邏輯 ---
        function showLoading(msg = "同步連線中...") { 
            document.getElementById('loading-text').innerText = msg;
            document.getElementById('loading-overlay').classList.remove('hidden'); 
        }
        function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }

        async function fetchData() {
            showLoading("正在拉取最新數據...");
            try { 
                let res = await fetch(GAS_API_URL); 
                let rawText = await res.text();
                try {
                    db = JSON.parse(rawText);
                } catch (jsonErr) {
                    throw new Error("API 未回傳正確的 JSON 資料。\n請確定你有正確點擊 Apps Script 裡的『部署』>『新增部署』。");
                }
                updateCoreUI(); 
            } 
            catch (err) { 
                alert("⛔️ 讀取失敗：\n\n" + err.message); 
            } 
            finally { hideLoading(); }
        }

        async function sendPostAction(action, dataObj, extraParams = {}) {
            showLoading("上傳雲端中...");
            try {
                let res = await fetch(GAS_API_URL, { method: "POST", body: JSON.stringify(Object.assign({ action, data: dataObj }, extraParams)) });
                let result = await res.json();
                if(result.status === "error") throw new Error(result.message);
                await fetchData();
            } catch (err) { 
                alert("⛔️ 寫入失敗：\n\n" + err.message); 
                hideLoading();
            }
        }

        function updateCoreUI() {
            let fundBalance = 0, myPersonalDebt = 0;
            if(!db.transactions) db.transactions = [];
            db.transactions.sort((a, b) => new Date(b.date) - new Date(a.date));

            db.transactions.forEach(t => {
                const amt = parseFloat(t.amount);
                const myRatio = parseFloat(t.splitRatio) / 100; 
                if (t.type === 'topup') fundBalance += amt;
                else if (t.type === 'expense') {
                    if (t.payer === 'fund') fundBalance -= amt;
                    else if (!t.isSettled) {
                        let myShare = amt * myRatio;
                        let partnerShare = amt - myShare;
                        if (t.payer === 'me') myPersonalDebt += partnerShare;
                        else if (t.payer === 'partner') myPersonalDebt -= myShare;
                    }
                }
            });

            document.getElementById('dash-fund-balance').innerText = `$${fundBalance.toLocaleString()}`;
            const sTitle = document.getElementById('settle-title');
            const sDesc = document.getElementById('settle-desc');
            
            if (myPersonalDebt === 0) { sTitle.innerText = "代墊結算狀態"; sDesc.innerText = "互不相欠"; }
            else if (myPersonalDebt > 0) { sTitle.innerText = "喬須給凱"; sDesc.innerText = `$${myPersonalDebt.toLocaleString()}`; }
            else { sTitle.innerText = "凱須給喬"; sDesc.innerText = `$${Math.abs(myPersonalDebt).toLocaleString()}`; }

            renderHistoryList();
            renderTodos();
            renderCharts();
        }

        document.getElementById('expense-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const payer = document.querySelector('input[name="payer"]:checked').value;
            const total = parseFloat(amtInput.value);
            const myShare = parseFloat(myShareInput.value) || 0;
            let calcRatio = payer === 'fund' ? 0 : (myShare / total) * 100;

            const expenseData = {
                id: Date.now(), type: 'expense', date: document.getElementById('exp-date').value,
                desc: document.getElementById('exp-desc').value, amount: total,
                payer: payer, splitRatio: calcRatio.toFixed(2),
                category: document.getElementById('exp-category').value, note: document.getElementById('exp-note').value,
                isSettled: false
            };

            let imageData = null;
            const fileInput = document.getElementById('receipt-upload');
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const base64String = await getBase64(file);
                const splitData = base64String.split(',');
                imageData = { mimeType: file.type, base64: splitData[1] };
            }

            closeModal('add-modal');
            sendPostAction("addTransaction", expenseData, { imageData: imageData });
        });

        document.getElementById('topup-form').addEventListener('submit', function(e) {
            e.preventDefault();
            sendPostAction("addTransaction", {
                id: Date.now(), type: 'topup', date: document.getElementById('top-date').value,
                desc: '存入公積金', amount: parseFloat(document.getElementById('top-amount').value),
                category: 'topup', note: document.getElementById('top-note').value
            });
            closeModal('topup-modal');
        });

        function deleteTx(id) { if(confirm('刪除這筆紀錄？')) sendPostAction("deleteTransaction", null, { id }); }
        function archiveSettlement() { if(confirm('確認將目前的代墊結清歸零嗎？')) sendPostAction("archive", null); }

        function renderHistoryList() {
            const list = document.getElementById('full-history-list');
            list.innerHTML = '';
            db.transactions.forEach(t => {
                const s = catIcons[t.category] || catIcons['other'];
                let tag = t.type==='topup' ? `<span class="text-[9px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-bold">入金</span>` : (t.payer==='fund' ? `<span class="text-[9px] bg-slate-200 text-slate-600 px-1.5 py-0.5 rounded font-bold">公積金</span>` : `<span class="text-[9px] bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded font-bold">${t.payer==='me'?'凱':'喬'}付</span>`);
                let imgIcon = t.receiptUrl ? `<a href="${t.receiptUrl}" target="_blank" class="text-indigo-400 hover:text-indigo-600 ml-2"><i class="fas fa-image"></i></a>` : '';

                list.insertAdjacentHTML('beforeend', `
                    <div class="p-3 border-b border-slate-100 flex justify-between items-center group hover:bg-slate-50 transition-colors">
                        <div class="flex gap-3 items-center">
                            <div class="w-10 h-10 rounded ${s.bg} ${s.color} flex items-center justify-center text-sm shrink-0"><i class="fas ${s.icon}"></i></div>
                            <div>
                                <h5 class="font-bold text-slate-700 text-xs md:text-sm">${t.desc} ${imgIcon}</h5>
                                <div class="flex items-center gap-2 mt-0.5"><p class="text-[10px] text-slate-400 font-medium">${t.date}</p>${tag}</div>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="font-bold text-sm ${t.type==='topup'?'text-emerald-600':'text-slate-800'}">$${parseFloat(t.amount).toLocaleString()}</div>
                            <button onclick="deleteTx(${t.id})" class="text-slate-300 hover:text-rose-500 p-1 md:opacity-0 md:group-hover:opacity-100 transition-opacity"><i class="fas fa-trash text-xs"></i></button>
                        </div>
                    </div>
                `);
            });
        }

        document.getElementById('todo-form').addEventListener('submit', function(e) {
            e.preventDefault();
            sendPostAction("addTodo", { id: Date.now(), text: document.getElementById('todo-input').value });
            document.getElementById('todo-input').value = '';
        });
        function toggleTodo(id, cur) { sendPostAction("toggleTodo", null, { id, completed: !cur }); }
        function deleteTodo(id) { sendPostAction("deleteTodo", null, { id }); }
        function convertTodo(id, text) { openAddModal(); document.getElementById('exp-desc').value = text; sendPostAction("deleteTodo", null, { id }); }
        
        function renderTodos() {
            const list = document.getElementById('todo-list');
            list.innerHTML = '';
            if(!db.todos) return;
            db.todos.forEach(t => {
                let isComp = (t.completed === true || t.completed === "true");
                list.insertAdjacentHTML('beforeend', `
                    <div class="p-3 border-b border-slate-50 flex items-center justify-between ${isComp ? 'opacity-40' : ''}">
                        <div class="flex items-center gap-3">
                            <input type="checkbox" ${isComp ? 'checked' : ''} onclick="toggleTodo(${t.id}, ${isComp})" class="w-4 h-4 text-indigo-600 rounded">
                            <span class="text-xs md:text-sm font-bold ${isComp ? 'line-through text-slate-400' : 'text-slate-700'}">${t.text}</span>
                        </div>
                        <div class="flex gap-2">
                            ${!isComp ? `<button onclick="convertTodo(${t.id}, '${t.text}')" class="text-[10px] md:text-xs bg-slate-100 text-slate-600 px-2 md:px-3 py-1 rounded font-bold hover:bg-slate-200"><i class="fas fa-exchange-alt mr-1"></i>轉支出</button>` : ''}
                            <button onclick="deleteTodo(${t.id})" class="text-slate-300 hover:text-rose-500 p-1"><i class="fas fa-trash text-xs"></i></button>
                        </div>
                    </div>
                `);
            });
        }

        function renderCharts() {
            if(document.getElementById('tab-dashboard').classList.contains('hidden')) return;
            const ctxL = document.getElementById('trendChart').getContext('2d');
            const labels = [];
            for (let i = 6; i >= 0; i--) { const d = new Date(); d.setDate(d.getDate() - i); labels.push(d.toISOString().split('T')[0]); }
            const lineData = labels.map(date => db.transactions.filter(t => t.date === date && t.type === 'expense').reduce((sum, t) => sum + parseFloat(t.amount), 0));
            
            if(tChart) tChart.destroy();
            tChart = new Chart(ctxL, {
                type: 'line',
                data: { 
                    labels: labels.map(l => l.substring(5)), 
                    datasets: [{ data: lineData, borderColor: '#4f46e5', backgroundColor: 'rgba(79, 70, 229, 0.1)', borderWidth: 2, tension: 0.3, fill: true, pointBackgroundColor: '#4f46e5', pointRadius: 3 }] 
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } }, 
                    scales: { 
                        x: { grid: { display: false }, ticks: { font: { size: 10 } } }, 
                        y: { beginAtZero: true, border: { dash: [4, 4] }, ticks: { font: { size: 10 } } } 
                    } 
                }
            });

            const ctxC = document.getElementById('categoryChart').getContext('2d');
            const catSums = { 'food':0, 'housing':0, 'transport':0, 'entertainment':0, 'other':0 };
            db.transactions.filter(t => t.type === 'expense').forEach(t => { if(catSums[t.category]!==undefined) catSums[t.category] += parseFloat(t.amount); });
            
            if(cChart) cChart.destroy();
            cChart = new Chart(ctxC, {
                type: 'doughnut',
                data: { 
                    labels: ['飲食', '居住', '交通', '娛樂', '其他'], 
                    datasets: [{ data: Object.values(catSums), backgroundColor: ['#3b82f6', '#14b8a6', '#a855f7', '#f59e0b', '#94a3b8'], borderWidth: 0 }] 
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    cutout: '75%', 
                    plugins: { legend: { position: 'right', labels: { usePointStyle: true, boxWidth: 6, font: { size: 11 } } } } 
                }
            });
        }

        // 初次進入頁面，自動讀取
        window.onload = fetchData;
    </script>
</body>
</html>
